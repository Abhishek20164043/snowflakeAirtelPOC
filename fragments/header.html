<style>
  .site-header-inner {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    align-items: center;
    height: 64px;
  }
  .header.header { /* once postlcp injects, EDS adds .header class */
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 1px solid rgb(41 44 49 / 8%);
  }
  body header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 1px solid rgb(41 44 49 / 8%);
    display: block;
  }
  .site-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    margin-right: 32px;
  }
  .site-logo svg { width: 80px; height: auto; display: block; }
  .site-nav-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
    height: 100%;
  }
  .site-nav-tab {
    display: flex;
    align-items: center;
    height: 64px;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 600;
    color: rgb(105 107 111);
    border-bottom: 2.5px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .site-nav-tab:hover { color: rgb(41 44 49); }
  .site-nav-tab.is-active { color: rgb(41 44 49); border-bottom-color: #E40000; }
  .site-nav-tab.has-more::after {
    content: '▾';
    font-size: 11px;
    margin-left: 4px;
  }
  .site-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .site-search-btn {
    background: none;
    padding: 8px;
    color: rgb(105 107 111);
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .site-search-btn:hover { background: rgb(247 247 250); }
  .site-signin {
    background: #000;
    color: rgb(246 246 246);
    font-weight: 700;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  @media (max-width: 1024px) {
    .site-header-inner { padding: 0 24px; }
  }
  @media (max-width: 768px) {
    .site-header-inner { padding: 0 20px; }
    .site-nav-tabs { display: none; }
  }
</style>

<div class="site-header-inner">
  <a href="/" class="site-logo" aria-label="Airtel Home">
    <svg viewBox="0 0 100 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M8 24 C8 14 14 8 22 10 C30 12 32 20 28 24 C26 26 22 27 18 26 C14 25 12 22 13 19 C14 16 17 15 20 16" stroke="#E40000" stroke-width="2.8" stroke-linecap="round" fill="none"></path>
      <text x="36" y="22" font-family="'Nunito', sans-serif" font-weight="800" font-size="13" fill="rgb(41,44,49)" letter-spacing="-0.3">airtel</text>
    </svg>
  </a>

  <nav class="site-nav-tabs" aria-label="Product navigation">
    <a href="/" class="site-nav-tab is-active">Wi-Fi</a>
    <a href="/" class="site-nav-tab">Priority Postpaid</a>
    <a href="/" class="site-nav-tab">Prepaid</a>
    <a href="/" class="site-nav-tab">DTH</a>
    <a href="/" class="site-nav-tab">Airtel Black</a>
    <a href="/looking-for" class="site-nav-tab has-more">More</a>
  </nav>

  <div class="site-header-right">
    <button class="site-search-btn" aria-label="Search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <button class="site-signin">Sign In</button>
  </div>
</div>
